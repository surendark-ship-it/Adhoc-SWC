<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspector Adhoc Dashboard — South West Cluster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#21262d;
  --text:#e6edf3;--muted:#8b949e;
  --blue:#58a6ff;--green:#3fb950;--orange:#f0883e;--red:#f85149;--purple:#bc8cff;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
.last-updated{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;gap:16px;color:var(--muted)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:13px;font-family:'JetBrains Mono',monospace}

/* TABS */
.city-tabs{display:flex;gap:6px;padding:16px 24px 0;flex-wrap:wrap}
.tab{padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  transition:all .15s;font-family:'Inter',sans-serif}
.tab:hover{border-color:var(--blue);color:var(--blue)}
.tab.active{border-color:var(--blue);background:#0d1f3c;color:var(--blue)}
.tab-count{font-size:10px;opacity:.7;margin-left:4px;font-family:'JetBrains Mono',monospace}

/* CONTAINER */
.container{padding:16px 24px}

/* SUMMARY CARDS */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.summary-val{font-size:22px;font-weight:600;font-family:'JetBrains Mono',monospace}
.summary-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

/* CITY TREND */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;margin-bottom:18px}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:12px}

/* INSPECTOR GRID */
.insp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:20px}
.insp-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px;cursor:pointer;transition:all .15s}
.insp-card:hover{border-color:#58a6ff55;transform:translateY(-1px)}
.insp-card.selected{border-color:var(--blue);background:#0a1929}

/* CARD HEADER */
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.insp-name{font-size:13px;font-weight:500}
.insp-may{font-size:11px;color:var(--muted);margin-top:2px}
.insp-total-wrap{text-align:right}
.insp-total{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace}
.vs-avg{font-size:11px;font-family:'JetBrains Mono',monospace}
.above{color:var(--red)}
.below{color:var(--green)}

/* TREND BADGE */
.trend-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;
  border-radius:4px;font-size:10px;font-weight:500;margin-top:3px}
.t-W{background:#1f0d0d;color:var(--red);border:1px solid #3d1a1a}
.t-I{background:#0d1f14;color:var(--green);border:1px solid #1a3d26}
.t-S{background:#161b22;color:var(--muted);border:1px solid var(--border)}

/* TYPE BARS */
.type-bars{margin:10px 0}
.type-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
.type-lbl{width:85px;color:var(--muted);flex-shrink:0}
.bar-bg{flex:1;height:5px;background:#21262d;border-radius:3px;overflow:hidden}
.bar-fill{height:5px;border-radius:3px;transition:width .4s ease}
.type-pct{width:42px;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text);font-size:11px}

/* MINI CHART */
.mini-wrap{height:52px;margin:8px 0}

/* TOP PARTS */
.parts-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.part-row{display:flex;justify-content:space-between;align-items:center;
  font-size:11px;padding:3px 0;border-bottom:1px solid #1c2128}
.part-row:last-child{border-bottom:none}
.part-name{color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;padding-right:8px}
.part-cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);font-weight:500}

/* AI PANEL */
.ai-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;margin-top:4px}
.ai-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ai-insp{font-size:14px;font-weight:600}
.ai-city{font-size:11px;color:var(--muted);margin-top:2px}
.ai-btn{background:#0d1f3c;border:1px solid var(--blue);color:var(--blue);
  padding:6px 16px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;font-family:'Inter',sans-serif}
.ai-btn:hover{background:#162d52}
.ai-btn:disabled{opacity:.4;cursor:not-allowed}
.ai-output{font-size:13px;line-height:1.75;color:#c9d1d9;white-space:pre-wrap;min-height:60px}
.ai-placeholder{color:var(--muted);font-size:13px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ai-thinking{color:var(--muted);font-size:13px;font-family:'JetBrains Mono',monospace;animation:blink 1.2s infinite}

/* ERROR */
.error-box{background:#1f0d0d;border:1px solid #3d1a1a;border-radius:8px;padding:16px;
  color:var(--red);font-size:13px;line-height:1.6}

@media(max-width:600px){
  .summary-row{grid-template-columns:1fr 1fr}
  .insp-grid{grid-template-columns:1fr}
  .container{padding:12px 16px}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Inspector Adhoc Dashboard</div>
    <div class="header-sub">BA Miss + Inspector Miss in CGT · South West Cluster</div>
  </div>
  <div class="last-updated" id="lastUpdated">Loading...</div>
</div>

<div id="cityTabs" class="city-tabs" style="display:none"></div>
<div id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    <div class="load-text">Fetching live data from Google Sheets...</div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────
let allData     = null;   // processed data for all cities
let currentCity = CONFIG.CITIES[0];
let selectedInsp= null;
let cityChart   = null;
const miniCharts= {};

// ── Fetch & Parse Google Sheet CSV ─────────────────────────
async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONFIG.DUMP_TAB)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} — make sure sheet is set to "Anyone with link can view"`);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    // Handle quoted fields properly
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += line[i]; }
    }
    vals.push(cur.trim());
    const row = {};
    headers.forEach((h,i) => row[h] = vals[i] || '');
    return row;
  });
}

// ── Process raw rows into inspector profiles ───────────────
function processData(rows) {
  // Filter: 4 cities + only BA Miss and Inspector Miss in CGT
  const filtered = rows.filter(r =>
    CONFIG.CITIES.includes(r.workshop_name) &&
    CONFIG.INCLUDE_TYPES.includes(r.adhoc_type)
  );

  const result = {};

  for (const city of CONFIG.CITIES) {
    const cityRows = filtered.filter(r => r.workshop_name === city);
    const inspectors = [...new Set(cityRows.map(r => r.i3_inspector))].sort();

    const inspList = inspectors.map(insp => {
      const g = cityRows.filter(r => r.i3_inspector === insp);

      // Monthly counts
      const monthly = CONFIG.MONTHS.map(m => {
        const [mon, yr] = m.split(' ');
        const MONTH_MAP = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
        return g.filter(r => {
          if (!r.Date && !r.request_created_at) return false;
          const d = new Date(r.Date || r.request_created_at);
          return d.getFullYear() === parseInt(yr) && d.getMonth() === MONTH_MAP[mon];
        }).length;
      });

      const ba      = g.filter(r => r.adhoc_type === 'BA Miss').length;
      const inspMiss= g.filter(r => r.adhoc_type === 'Inspector Miss in Cgt Universe').length;
      const total   = g.length;

      // Top 5 parts
      const partCounts = {};
      g.forEach(r => { if(r.node_name) partCounts[r.node_name] = (partCounts[r.node_name]||0)+1; });
      const top5 = Object.entries(partCounts).sort((a,b)=>b[1]-a[1]).slice(0,5)
        .map(([part,count]) => ({part, count}));

      // Trend: compare last 2 available months
      const nonZero = monthly.filter(v => v > 0);
      const lastTwo = monthly.slice(-2).filter(v => v > 0);
      const trend = lastTwo.length < 2 ? 'Stable' :
        lastTwo[1] > lastTwo[0]*1.15 ? 'Worsening' :
        lastTwo[1] < lastTwo[0]*0.85 ? 'Improving' : 'Stable';

      return {
        name: insp, total, ba, inspMiss,
        baPct:    total ? +(ba/total*100).toFixed(1) : 0,
        inspPct:  total ? +(inspMiss/total*100).toFixed(1) : 0,
        monthly, top5, trend,
        lastMonth: monthly[monthly.length-1],
        prevMonth: monthly[monthly.length-2] || 0,
      };
    }).filter(i => i.total > 0).sort((a,b) => b.total - a.total);

    // City monthly totals
    const cityMonthly = CONFIG.MONTHS.map(m => {
      const [mon, yr] = m.split(' ');
      const MONTH_MAP = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
      return cityRows.filter(r => {
        const d = new Date(r.Date || r.request_created_at);
        return d.getFullYear() === parseInt(yr) && d.getMonth() === MONTH_MAP[mon];
      }).length;
    });

    const totalAdhoc  = cityRows.length;
    const avgPerInsp  = inspList.length ? +(totalAdhoc / inspList.length).toFixed(1) : 0;
    const worsening   = inspList.filter(i => i.trend === 'Worsening').length;

    result[city] = { inspectors: inspList, monthly: cityMonthly, total: totalAdhoc, avgPerInsp, worsening };
  }
  return result;
}

// ── Render city tabs ───────────────────────────────────────
function renderTabs() {
  const tabsEl = document.getElementById('cityTabs');
  tabsEl.style.display = 'flex';
  tabsEl.innerHTML = '';
  for (const city of CONFIG.CITIES) {
    const cd    = allData[city];
    const short = city.replace('NC ','').replace(' Integrated','');
    const btn   = document.createElement('button');
    btn.className = 'tab' + (city === currentCity ? ' active' : '');
    btn.innerHTML = `${short} <span class="tab-count">(${cd.inspectors.length})</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentCity  = city;
      selectedInsp = null;
      renderCity();
    };
    tabsEl.appendChild(btn);
  }
}

// ── Render city view ───────────────────────────────────────
function renderCity() {
  const cd    = allData[currentCity];
  const color = CONFIG.COLORS[currentCity];
  const short = currentCity.replace('NC ','').replace(' Integrated','');

  // Destroy old charts
  Object.values(miniCharts).forEach(c => { try{c.destroy()}catch(e){} });
  Object.keys(miniCharts).forEach(k => delete miniCharts[k]);
  if (cityChart) { try{cityChart.destroy()}catch(e){} cityChart = null; }

  document.getElementById('mainContent').innerHTML = `
    <div class="container">
      <div class="summary-row">
        <div class="summary-card">
          <div class="summary-val" style="color:${color}">${cd.total.toLocaleString()}</div>
          <div class="summary-lbl">Total Adhoc</div>
        </div>
        <div class="summary-card">
          <div class="summary-val">${cd.inspectors.length}</div>
          <div class="summary-lbl">Inspectors</div>
        </div>
        <div class="summary-card">
          <div class="summary-val">${cd.avgPerInsp}</div>
          <div class="summary-lbl">Avg / Inspector</div>
        </div>
        <div class="summary-card">
          <div class="summary-val" style="color:${cd.worsening > 0 ? 'var(--red)' : 'var(--green)'}">${cd.worsening}</div>
          <div class="summary-lbl">Worsening Trend</div>
        </div>
      </div>

      <div class="chart-card">
        <div class="section-title">${short} — Monthly Trend (BA Miss + Inspector Miss CGT)</div>
        <canvas id="cityChart" height="70"></canvas>
      </div>

      <div class="section-title">All Inspectors — click card for AI diagnosis</div>
      <div class="insp-grid" id="inspGrid"></div>
      <div id="aiPanel" style="display:none"></div>
    </div>
  `;

  // City chart
  requestAnimationFrame(() => {
    const ctx = document.getElementById('cityChart');
    if (!ctx) return;
    cityChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: CONFIG.MONTHS,
        datasets: [{
          label: 'Adhoc',
          data: cd.monthly,
          borderColor: color,
          backgroundColor: color + '22',
          fill: true, tension: .35,
          pointBackgroundColor: color,
          pointRadius: 4, pointHoverRadius: 6,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c2128', titleColor: '#e6edf3',
            bodyColor: '#8b949e', borderColor: '#30363d', borderWidth: 1
          }
        },
        scales: {
          x: { grid:{color:'#21262d'}, ticks:{color:'#8b949e',font:{size:11}} },
          y: { grid:{color:'#21262d'}, ticks:{color:'#8b949e',font:{size:11}} }
        }
      }
    });
  });

  // Inspector cards
  const grid = document.getElementById('inspGrid');
  cd.inspectors.forEach(insp => {
    const vsAvg = insp.total - cd.avgPerInsp;
    const vsLabel = vsAvg >= 0
      ? `<span class="vs-avg above">+${vsAvg.toFixed(0)}</span>`
      : `<span class="vs-avg below">${vsAvg.toFixed(0)}</span>`;
    const trendIcon = insp.trend==='Worsening'?'↑':insp.trend==='Improving'?'↓':'→';
    const safeId = insp.name.replace(/[^a-z0-9]/gi,'_');

    const card = document.createElement('div');
    card.className = 'insp-card';
    card.id = 'card_' + safeId;
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="insp-name">${insp.name}</div>
          <div class="insp-may">Last month: <strong style="font-family:'JetBrains Mono',monospace">${insp.lastMonth}</strong></div>
        </div>
        <div class="insp-total-wrap">
          <div class="insp-total" style="color:${color}">${insp.total} ${vsLabel}</div>
          <div><span class="trend-badge t-${insp.trend[0]}">${trendIcon} ${insp.trend}</span></div>
        </div>
      </div>
      <div class="type-bars">
        <div class="type-row">
          <span class="type-lbl">BA Miss</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${insp.baPct}%;background:#58a6ff"></div></div>
          <span class="type-pct">${insp.baPct}%</span>
        </div>
        <div class="type-row">
          <span class="type-lbl">Insp Miss CGT</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${insp.inspPct}%;background:#f0883e"></div></div>
          <span class="type-pct">${insp.inspPct}%</span>
        </div>
      </div>
      <div class="mini-wrap"><canvas id="mini_${safeId}"></canvas></div>
      <div class="parts-title">Top Missed Parts</div>
      ${insp.top5.map(p => `
        <div class="part-row">
          <span class="part-name">${p.part}</span>
          <span class="part-cnt">${p.count}x</span>
        </div>`).join('')}
    `;
    card.onclick = () => selectInspector(insp, card);
    grid.appendChild(card);

    // Mini bar chart
    requestAnimationFrame(() => {
      const mc = document.getElementById('mini_' + safeId);
      if (!mc) return;
      miniCharts[insp.name] = new Chart(mc, {
        type: 'bar',
        data: {
          labels: CONFIG.MONTHS.map(m => m.split(' ')[0]),
          datasets: [{
            data: insp.monthly,
            backgroundColor: color + '99',
            borderColor: color,
            borderWidth: 1,
            borderRadius: 2
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: {display:false},
            tooltip: {
              backgroundColor:'#1c2128',titleColor:'#e6edf3',
              bodyColor:'#8b949e',borderColor:'#30363d',borderWidth:1,
              callbacks: { title: items => CONFIG.MONTHS[items[0].dataIndex] }
            }
          },
          scales: {
            x: { grid:{display:false}, ticks:{color:'#8b949e',font:{size:9}} },
            y: { display: false }
          }
        }
      });
    });
  });
}

// ── Select inspector ───────────────────────────────────────
function selectInspector(insp, card) {
  document.querySelectorAll('.insp-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedInsp = insp;

  const color = CONFIG.COLORS[currentCity];
  const short = currentCity.replace('NC ','').replace(' Integrated','');
  const cd    = allData[currentCity];

  document.getElementById('aiPanel').style.display = 'block';
  document.getElementById('aiPanel').innerHTML = `
    <div class="ai-panel">
      <div class="ai-top">
        <div>
          <div class="ai-insp">${insp.name}</div>
          <div class="ai-city">${short} · ${insp.total} total adhoc · vs avg ${(insp.total - cd.avgPerInsp) >= 0 ? '+' : ''}${(insp.total - cd.avgPerInsp).toFixed(0)}</div>
        </div>
        <button class="ai-btn" id="aiBtn" onclick="runClaude()">▶ Claude Diagnosis</button>
      </div>
      <div class="ai-output" id="aiOut">
        <span class="ai-placeholder">Click "Claude Diagnosis" to get AI analysis for ${insp.name}</span>
      </div>
    </div>
  `;
  document.getElementById('aiPanel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ── Claude API call ────────────────────────────────────────
async function runClaude() {
  if (!selectedInsp) return;
  const insp = selectedInsp;
  const cd   = allData[currentCity];
  const btn  = document.getElementById('aiBtn');
  const out  = document.getElementById('aiOut');

  btn.disabled = true;
  btn.textContent = '⏳ Thinking...';
  out.innerHTML = '<span class="ai-thinking">Claude is analysing the inspector profile...</span>';

  const monthlyStr = CONFIG.MONTHS.map((m,i) => `${m}: ${insp.monthly[i]}`).join(' | ');
  const partsStr   = insp.top5.map((p,i) => `${i+1}. ${p.part} (${p.count}x)`).join('\n');

  const prompt = `You are a refurbishment quality analyst at a used car company in India.

Analyse this i3 inspector's adhoc data. Only BA Miss and Inspector Miss in CGT Universe are included.

INSPECTOR: ${insp.name}
CITY: ${currentCity}
CITY AVG: ${cd.avgPerInsp} adhoc per inspector
INSPECTOR TOTAL: ${insp.total} (${insp.total > cd.avgPerInsp ? '+' + (insp.total - cd.avgPerInsp).toFixed(0) + ' above avg' : (insp.total - cd.avgPerInsp).toFixed(0) + ' below avg'})
TREND: ${insp.trend}

MONTHLY (Jan–May 2026):
${monthlyStr}

TYPE SPLIT:
- BA Miss: ${insp.ba} (${insp.baPct}%) — Business Analyst missed at pre-inspection assessment
- Inspector Miss in CGT Universe: ${insp.inspMiss} (${insp.inspPct}%) — Inspector missed during i3 check

TOP 5 MISSED PARTS:
${partsStr}

Respond in this exact format:
ROOT CAUSE: [knowledge gap / process gap / behaviour gap — explain which based on the data pattern]
TOP CONCERN: [single biggest red flag with specific numbers and part names]
MANAGER ACTION: [what city lead should do with this inspector THIS WEEK — be specific]
INSPECTOR FIX: [what this inspector should personally change at their next inspection]

Under 200 words. Direct. Use actual numbers and part names from the data above.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 450,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    out.textContent = data.content?.[0]?.text || 'No response received.';
  } catch(e) {
    out.innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
  }

  btn.disabled = false;
  btn.textContent = '▶ Claude Diagnosis';
}

// ── INIT ───────────────────────────────────────────────────
async function init() {
  try {
    const rows = await fetchSheetData();
    allData = processData(rows);

    // Update header
    document.getElementById('lastUpdated').textContent =
      'Live · ' + new Date().toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

    renderTabs();
    renderCity();
  } catch(err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="container">
        <div class="error-box">
          <strong>Could not load data</strong><br><br>
          ${err.message}<br><br>
          Make sure your Google Sheet is set to <strong>"Anyone with the link can view"</strong>:<br>
          Share → Change access → Anyone with the link → Viewer → Done
        </div>
      </div>
    `;
  }
}

init();
</script>
</body>
</html>
